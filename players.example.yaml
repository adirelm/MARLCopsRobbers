group_name: "adrl-001"            # §3.5 group_name (matches config project.group_code)

# §3.5 github_repo — owner slug is PII-adjacent, so it lives here (git-ignored
# in players.local.yaml), NOT in config.yaml.
github_repo: "https://github.com/<OWNER>/Assignment6-MARLCopsRobbers"

# §3.5 students[]: SOLO submission — exactly one entry (role A).
# id pattern: ^[0-9]{5,12}$ (validated by the report schema).
# (Schema still accepts B/C if a partner ever joins; left commented.)
students:
  - role: "A"
    full_name: "<STUDENT A FULL NAME>"
    id: "<STUDENT A ID>"
