name: CI

# V3 hard-gate enforcement on every push / PR (§6 coverage, §7 ruff, §3.2 file size,
# §7.4 secrets). uv-only (§8.4); the file-size gate runs AFTER ruff format (a format pass
# can expand a file past 150 LOC). Python 3.12 (the project's >=3.11 floor — broad wheels).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync deps (dev + mcp + gui extra)
        run: uv sync --extra gui --group dev --group mcp

      - name: Ruff lint (zero violations)
        run: uv run ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ scripts/

      - name: File-size gate (<=150 LOC; AFTER format)
        run: uv run python scripts/check_file_sizes.py

      - name: Tests + coverage (>=85%, suite fails below)
        run: uv run pytest tests/ --cov=src --cov-report=term-missing

      - name: Secrets + recipient guard (must find nothing)
        run: |
          ! grep -RInE '(api[_-]?key|secret|password|token)[[:space:]]*=[[:space:]]*["'"'"'][^"'"'"']{6,}' src/
          ! grep -RIn 'rmisegal+marl' src/
          test -f .env-example && test -f uv.lock
